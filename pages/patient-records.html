<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Records</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/patient-records.css">
</head>

<body>

<main class="doctor-page">

  <section class="page-header">
    <div>
      <h1>Patient Records</h1>
      <p>Search and review patient medical records.</p>
    </div>

    <a href="doctor-dashboard.html" class="back-btn">Back to Dashboard</a>
  </section>

  <section class="search-section">
    <input type="text" id="recordSearch" placeholder="Search patient name...">
  </section>

  <section class="records-grid">

    <div class="record-card">
      <h2>John Doe</h2>
      <p><strong>Age:</strong> 34</p>
      <p><strong>Diagnosis:</strong> Myopia</p>
      <p><strong>Last Visit:</strong> 2026-05-01</p>
      <button class="view-btn">View Details</button>
    </div>

    <div class="record-card">
      <h2>Jane Smith</h2>
      <p><strong>Age:</strong> 41</p>
      <p><strong>Diagnosis:</strong> Dry Eye</p>
      <p><strong>Last Visit:</strong> 2026-04-22</p>
      <button class="view-btn">View Details</button>
    </div>

    <div class="record-card">
      <h2>Omar Ali</h2>
      <p><strong>Age:</strong> 52</p>
      <p><strong>Diagnosis:</strong> Glaucoma</p>
      <p><strong>Last Visit:</strong> 2026-04-18</p>
      <button class="view-btn">View Details</button>
    </div>

  </section>

</main>

<script src="../js/patient-records.js"></script>
<script src="../js/global.js"></script>

</body>
</html>
