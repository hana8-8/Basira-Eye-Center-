    <!-- CTA BUTTONS -->
    <div class="nav-cta">
      <!-- Shown only when NOT logged in -->
      <div id="nav-auth-guest">
        <a href="login.html" class="btn-login">Login / Register</a>
      </div>

      <!-- Shown only when logged in -->
      <div id="nav-auth-user" style="display:none;">

        <button id="nav-logout-btn" class="btn-login">Logout</button>
      </div>

<main class="auth-page">

  <section class="auth-container">

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" id="loginTab">Login</button>
      <button type="button" class="auth-tab" id="registerTab">Register</button>
      <button type="button" class="auth-tab" id="loginAdmin">Login as Admin</button>
    </div>


    <!-- LOGIN FORM -->
    <form class="auth-form active" id="loginForm" method="POST">

      <h2>Login</h2>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
      </div>

      <div class="form-group">
        <label for="loginRole">Login as</label>
        <select id="loginRole" name="role" required>
          <option value="">Select role</option>
          <option value="patient">Patient</option>
          <option value="doctor">Doctor</option>
        </select>
      </div>

      <button type="submit">Login</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form" id="registerForm" method="POST">

      <h2>Create Account</h2>

      <div class="form-group">
        <label for="registerRole">Register as Patient</label>
      </div>

      <div class="form-group">
        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" name="password" placeholder="Create a password" required>
      </div>

      <div class="form-group">
        <label for="registerConfirmPassword">Confirm Password</label>
        <input type="password" id="registerConfirmPassword" name="confirm_password" placeholder="Confirm your password" required>
      </div>


      <button type="submit">Register</button>
    </form>

    <!-- LOGIN AS ADMIN FORM -->
     <form class="auth-form" id="adminLoginForm" method="POST">

      <h2>Admin Login</h2>

      <div class="form-group">
        <label for="adminEmail">Email</label>
        <input type="email" id="adminEmail" name="email" placeholder="Enter admin email" required>
      </div>

      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" name="password" placeholder="Enter admin password" required>
      </div>

      <!-- <div class="form-group">
        <label for="adminRole">Login as Admin</label>
      </div> -->

      <button type="submit">Login as Admin</button>
    </form>

  </section>

</main>

<script src="../js/auth.js"></script>
<script src="../js/global.js"></script>


</body>
</html>
